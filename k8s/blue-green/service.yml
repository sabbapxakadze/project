apiVersion: v1
kind: Service
metadata:
  name: devops-web-app
spec:
  type: LoadBalancer
  selector:
    app: devops-web-app
    version: blue
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP

# To switch traffic from Blue to Green, run:
#   kubectl patch service devops-web-app -p '{"spec":{"selector":{"version":"green"}}}'
#
# To rollback to Blue:
#   kubectl patch service devops-web-app -p '{"spec":{"selector":{"version":"blue"}}}'
