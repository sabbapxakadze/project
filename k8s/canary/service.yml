apiVersion: v1
kind: Service
metadata:
  name: devops-web-app
spec:
  type: LoadBalancer
  selector:
    app: devops-web-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP

# This service selects ALL pods with "app: devops-web-app" label,
# distributing traffic across both stable (3 pods) and canary (1 pod).
# Canary gets ~25% of traffic automatically via round-robin.
